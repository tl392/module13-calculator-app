{% extends "layout.html" %}

{% block title %}Login{% endblock %}

{% block content %}
<div class="auth-page">
    <div class="auth-card">
        <h2>Welcome Back</h2>

        <div id="errorAlert" class="alert alert-error hidden" role="alert">
            <span id="errorMessage"></span>
        </div>

        <div id="successAlert" class="alert alert-success hidden" role="alert">
            <span id="successMessage"></span>
        </div>

        <form id="loginForm" class="auth-form" onsubmit="return false;">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" required>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required>
            </div>

            <div class="form-row">
                <label class="checkbox-group">
                    <input id="remember" name="remember" type="checkbox">
                    <span>Remember me</span>
                </label>

                <a href="#" class="form-link">Forgot password?</a>
            </div>

            <button type="submit" class="auth-btn">Sign in</button>
        </form>

        <p class="auth-footer">
            Don't have an account?
            <a href="{{ url_for('register_page') }}">Register now</a>
        </p>
    </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
    const form = document.getElementById('loginForm');
    const errorAlert = document.getElementById('errorAlert');
    const errorMessage = document.getElementById('errorMessage');
    const successAlert = document.getElementById('successAlert');
    const successMessage = document.getElementById('successMessage');

    if (!form || !errorAlert || !errorMessage || !successAlert || !successMessage) {
        console.error('Required elements not found');
        return;
    }

    function showError(message) {
        errorMessage.textContent = message;
        errorAlert.classList.remove('hidden');
        successAlert.classList.add('hidden');
    }

    function showSuccess(message) {
        successMessage.textContent = message;
        successAlert.classList.remove('hidden');
        errorAlert.classList.add('hidden');
    }

    function storeTokens(tokenData) {
        localStorage.setItem('access_token', tokenData.access_token);
        localStorage.setItem('refresh_token', tokenData.refresh_token);
        localStorage.setItem('token_expires', tokenData.expires_at);
        localStorage.setItem('user_id', tokenData.user_id);
        localStorage.setItem('username', tokenData.username);
    }

    form.addEventListener('submit', async function(e) {
        e.preventDefault();

        errorAlert.classList.add('hidden');
        successAlert.classList.add('hidden');

        const formData = {
            username: form.username.value.trim(),
            password: form.password.value
        };

        if (!formData.username || !formData.password) {
            showError('Please fill in all fields');
            return;
        }

        try {
            const response = await fetch('/auth/login', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify(formData)
            });

            const data = await response.json();

            if (!response.ok) {
                throw new Error(data.detail || 'Login failed');
            }

            storeTokens(data);

            if (form.remember.checked) {
                localStorage.setItem('remember_login', 'true');
                localStorage.setItem('remembered_username', formData.username);
            } else {
                localStorage.removeItem('remember_login');
                localStorage.removeItem('remembered_username');
            }

            showSuccess('Login successful! Redirecting...');

            setTimeout(() => {
                window.location.href = '/dashboard';
            }, 1000);

        } catch (error) {
            showError(error.message || 'Invalid username or password');
        }
    });

    if (localStorage.getItem('remember_login') === 'true') {
        const rememberedUsername = localStorage.getItem('remembered_username');
        if (rememberedUsername) {
            form.username.value = rememberedUsername;
            form.remember.checked = true;
        }
    }
});
</script>
{% endblock %}
